<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MD.AI 性能测试套件</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; margin: 0; padding: 0 16px 32px; }
      header { position: sticky; top: 0; background: #fff; padding: 12px 0; border-bottom: 1px solid #eee; z-index: 10; }
      .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
      .controls label { font-size: 14px; color: #333; }
      .controls select, .controls input, .controls button { padding: 6px 8px; font-size: 14px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
      .card { border: 1px solid #eee; border-radius: 8px; padding: 12px; background: #fafafa; }
      .results { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; white-space: pre-wrap; background: #fff; padding: 12px; border-radius: 6px; border: 1px solid #eee; }
      .stage { margin-top: 12px; }
      .stage h3 { margin: 8px 0; }
      #mount { height: 60vh; border: 1px solid #eee; border-radius: 8px; overflow: auto; background: #fff; }
    </style>
  </head>
  <body>
    <header>
      <div class="controls">
        <label>数据集：
          <select id="dataset">
            <option value="text">纯文本</option>
            <option value="code">代码密集</option>
            <option value="math">公式密集</option>
            <option value="mermaid">Mermaid 密集</option>
            <option value="mixed" selected>混合</option>
          </select>
        </label>
        <label>大小：
          <select id="size">
            <option value="5k">5K</option>
            <option value="10k" selected>10K</option>
            <option value="30k">30K</option>
            <option value="60k">60K</option>
          </select>
        </label>
        <label>
          <input type="checkbox" id="useVirtual" checked /> 使用 VirtualPreview（大文档推荐）
        </label>
        <button id="runStartup">启动时间</button>
        <button id="runInput">输入延迟</button>
        <button id="runScroll">滚动 FPS</button>
        <button id="runMemory">内存占用</button>
        <button id="runAll">运行全部</button>
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <h2>测试挂载区</h2>
        <div id="mount"></div>
      </div>
      <div class="card">
        <h2>结果</h2>
        <div id="results" class="results">点击上方按钮运行测试...</div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
