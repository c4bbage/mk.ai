# GLM-5.2 — the model you want to observe.
#
# GLM-5.2 is a ~355B-parameter MoE. The checkpoint on h202 is FP8 (~355 GB on disk).
# When loaded with dtype=bfloat16, PyTorch auto-dequantizes fp8→bf16 in memory
# (~700 GB RAM). This is fully differentiable and supports autograd for fitting.
#
# Memory requirement: bf16 in-memory = ~700 GB across all GPUs.
# On h202 (8x H20-96GB = 768 GB total), this needs most GPUs freed.
#
# Fitting strategy:
#   1. Free enough GPUs (device_map=auto will shard across them).
#   2. Start with a SMALL layer subset (source_layers: "every4") to bound cost.
#   3. Use small n_prompts (20-50) for initial validation.
name: glm-5.2-fp8
hf_path: /data/GLM-5.2-FP8
dtype: bfloat16
device_map: auto
checkpoint_quant: fp8
trust_remote_code: true
# GLM MoE uses the standard model.layers / model.norm / model.embed_tokens
# layout, so auto-detect works; override here only if a future arch differs.
layout: {}
source_layers: every4             # sparse subset — a full-depth fit is very expensive
dim_batch: 4
max_seq_len: 128
skip_first: 16
n_prompts: 100
corpus: /data/corpus_real.txt
notes: >
  GLM-5.2 355B MoE. FP8 checkpoint auto-dequantizes to bf16 on load. Needs ~700 GB
  GPU memory (dedicated allocation, free most GPUs first).
