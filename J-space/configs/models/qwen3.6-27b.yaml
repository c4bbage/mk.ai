# Qwen3.6-27B — the model the Mac reference (WeZZard/jlens-qwen36) targets, but
# here in full bf16 on CUDA with autograd (no MLX/Metal custom kernel needed).
# bf16 ~54 GB: shard across a few freed GPUs with device_map=auto, or pin to one
# 143 GB H20 if a whole card is free.
name: qwen3.6-27b
hf_path: /data/Qwen3.6-27B        # bf16 checkpoint already on h202
dtype: bfloat16
device_map: auto
max_memory: {"0": "120GiB", "1": "120GiB", "cpu": "200GiB"}
checkpoint_quant: none
source_layers: workspace          # ~L16..L48 of 64; the "workspace-like" band
dim_batch: 8
max_seq_len: 128
skip_first: 16
n_prompts: 100
corpus: /data/corpus_real.txt
notes: "Qwen3.6-27B bf16, CUDA autograd. Same model family as the Mac reference."
