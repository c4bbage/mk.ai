# Qwen3-4B on local RTX 4090 (24GB). bf16 ~8GB weights + activations.
# Plenty of headroom for fitting and serving.
name: qwen3-4b
hf_path: Qwen/Qwen3-4B              # auto-downloads from HF on first use
dtype: bfloat16
device_map: {"": 0}                  # pin to single GPU (4090 only has 1)
checkpoint_quant: none
source_layers: workspace             # middle band of depth
dim_batch: 8
max_seq_len: 128
skip_first: 8
n_prompts: 60
corpus: null                         # -> wikitext; override with local .txt if preferred
notes: "Qwen3-4B dense on RTX 4090. Good local dev/test target."
