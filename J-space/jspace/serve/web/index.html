<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>J-space visualizer</title>
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --line:#2a3240; --fg:#e6edf3; --muted:#8b949e;
    --accent:#58a6ff; --hot:#f78166; --ok:#3fb950;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  header { padding:12px 18px; border-bottom:1px solid var(--line);
    display:flex; gap:16px; align-items:baseline; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; }
  header .meta { color:var(--muted); font-size:12px; }
  main { padding:18px; display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  textarea, input, select, button {
    background:var(--panel); color:var(--fg); border:1px solid var(--line);
    border-radius:6px; padding:8px 10px; font:inherit; }
  textarea { width:100%; min-height:60px; resize:vertical; }
  button { cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); color:#08131f; border-color:var(--accent); font-weight:600; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; }
  .panel h2 { font-size:13px; margin:0 0 10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
  .gridwrap { overflow-x:auto; border:1px solid var(--line); border-radius:8px; }
  table.slice { border-collapse:collapse; font-size:11px; }
  table.slice th, table.slice td { border:1px solid var(--line); padding:2px 5px; white-space:nowrap; text-align:center; }
  table.slice th.lyr { position:sticky; left:0; background:var(--panel); color:var(--muted); z-index:1; }
  table.slice td.cell { cursor:pointer; max-width:120px; overflow:hidden; text-overflow:ellipsis; }
  table.slice td.cell:hover { outline:2px solid var(--accent); }
  table.slice tr.model td { background:#132a1b; color:var(--ok); }
  table.slice td.pinned { outline:2px solid var(--hot); }
  .tok { color:var(--muted); }
  .detail .kv { display:flex; justify-content:space-between; gap:20px; padding:2px 0; border-bottom:1px dashed var(--line); }
  .detail .kv .t { color:var(--fg); }
  .detail .kv .s { color:var(--muted); }
  .out { white-space:pre-wrap; background:#0b0f14; border:1px solid var(--line); border-radius:6px; padding:10px; min-height:24px; }
  .diff { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  label.f { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--muted); }
  .spin { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>J-space</h1>
  <span class="meta" id="meta">loading…</span>
</header>
<main>
  <div class="panel">
    <div class="row"><textarea id="prompt">Fact: The currency used in the country shaped like a boot is the</textarea></div>
    <div class="row">
      <button class="primary" onclick="runSlice()">Compute slice</button>
      <label class="f">max_seq_len<input id="maxlen" type="number" value="256" style="width:90px"></label>
      <span class="spin" id="slicestatus"></span>
    </div>
  </div>

  <div class="panel">
    <h2>Slice · top-1 lens token per (layer × position)</h2>
    <div class="gridwrap"><div id="grid">Run a slice to populate.</div></div>
  </div>

  <div class="row" style="align-items:flex-start">
    <div class="panel detail" style="flex:1; min-width:280px">
      <h2>Readout · <span id="pinlabel">click a cell</span></h2>
      <div id="detail">—</div>
    </div>
    <div class="panel" style="flex:1; min-width:280px">
      <h2>Generate</h2>
      <div class="row">
        <button onclick="runGen()">Baseline generate</button>
        <label class="f">max_tokens<input id="gentok" type="number" value="48" style="width:80px"></label>
      </div>
      <div class="out" id="genout" style="margin-top:10px">—</div>
    </div>
  </div>

  <div class="panel">
    <h2>Intervene · write to the J-space</h2>
    <div class="row">
      <select id="mode" onchange="syncMode()">
        <option value="steer">steer (inject / suppress)</option>
        <option value="swap">swap (s → t)</option>
        <option value="ablate">ablate (remove top-k J-space)</option>
      </select>
      <label class="f">layer<input id="ilayer" type="number" value="0" style="width:70px"></label>
      <label class="f">position<input id="ipos" type="number" value="-1" style="width:70px"></label>
      <label class="f" id="f_token">concept<input id="itoken" value=" France" style="width:120px"></label>
      <label class="f" id="f_token2" style="display:none">→ concept<input id="itoken2" value=" Spain" style="width:120px"></label>
      <label class="f" id="f_alpha">alpha<input id="ialpha" type="number" value="8" style="width:70px"></label>
      <label class="f" id="f_k" style="display:none">k<input id="ik" type="number" value="16" style="width:60px"></label>
      <button class="primary" onclick="runIntervene()">Run</button>
      <span class="spin" id="istatus"></span>
    </div>
    <div class="diff" style="margin-top:12px">
      <div><div class="tok">baseline</div><div class="out" id="ibase">—</div></div>
      <div><div class="tok">intervened</div><div class="out" id="iint">—</div></div>
    </div>
  </div>
</main>

<script>
let META = null, PROMPT_TOKENS = [], PIN = null;

async function api(path, body) {
  const r = await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadMeta() {
  META = await (await fetch('/api/meta')).json();
  document.getElementById('meta').textContent =
    `${META.model} · ${META.n_layers}L · d=${META.d_model} · lens: ${META.lens_layers.length} layers, ${META.n_prompts} prompts`;
  document.getElementById('ilayer').value = META.lens_layers[Math.floor(META.lens_layers.length/2)] ?? 0;
}

async function runSlice() {
  const s = document.getElementById('slicestatus'); s.textContent = 'computing…';
  try {
    const data = await api('/api/slice', {prompt: document.getElementById('prompt').value,
      max_seq_len: +document.getElementById('maxlen').value});
    PROMPT_TOKENS = data.tokens;
    renderGrid(data);
    s.textContent = '';
  } catch(e) { s.textContent = 'error: '+e.message; }
}

function renderGrid(data) {
  const tokens = data.tokens;
  let html = '<table class="slice"><tr><th class="lyr">layer\\pos</th>';
  tokens.forEach((t,i)=>{ html += `<th title="${esc(t)}">${i}<br><span class="tok">${esc(clip(t))}</span></th>`; });
  html += '</tr>';
  data.grid.forEach(rowObj=>{
    const cls = rowObj.is_model ? 'model' : '';
    html += `<tr class="${cls}"><th class="lyr">L${rowObj.layer}${rowObj.is_model?' ▸out':''}</th>`;
    rowObj.tokens.forEach((tk,pos)=>{
      html += `<td class="cell" data-layer="${rowObj.layer}" data-pos="${pos}" data-model="${rowObj.is_model?1:0}" title="${esc(tk)}" onclick="pin(this)">${esc(clip(tk))}</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  document.getElementById('grid').innerHTML = html;
}

async function pin(td) {
  document.querySelectorAll('td.pinned').forEach(e=>e.classList.remove('pinned'));
  td.classList.add('pinned');
  const layer = +td.dataset.layer, pos = +td.dataset.pos, isModel = td.dataset.model==='1';
  document.getElementById('pinlabel').textContent = `L${layer} · pos ${pos}`;
  document.getElementById('ilayer').value = isModel ? META.lens_layers.at(-1) : layer;
  document.getElementById('ipos').value = pos;
  if (isModel) { document.getElementById('detail').textContent = '(model output row)'; return; }
  const d = document.getElementById('detail'); d.innerHTML = 'reading…';
  try {
    const data = await api('/api/readout', {prompt: document.getElementById('prompt').value, layer, position: pos, k:10});
    d.innerHTML = data.topk.map(x=>`<div class="kv"><span class="t">${esc(x.token)}</span><span class="s">${x.logit.toFixed(2)}</span></div>`).join('');
  } catch(e) { d.textContent = 'error: '+e.message; }
}

async function runGen() {
  const o = document.getElementById('genout'); o.textContent = 'generating…';
  try {
    const data = await api('/api/generate', {prompt: document.getElementById('prompt').value,
      max_tokens: +document.getElementById('gentok').value});
    o.textContent = data.text || '(empty)';
  } catch(e){ o.textContent='error: '+e.message; }
}

function syncMode(){
  const m = document.getElementById('mode').value;
  document.getElementById('f_token').style.display = m==='ablate'?'none':'flex';
  document.getElementById('f_token2').style.display = m==='swap'?'flex':'none';
  document.getElementById('f_alpha').style.display = m==='ablate'?'none':'flex';
  document.getElementById('f_k').style.display = m==='ablate'?'flex':'none';
}

async function runIntervene(){
  const s = document.getElementById('istatus'); s.textContent='running…';
  try {
    const data = await api('/api/intervene', {
      prompt: document.getElementById('prompt').value,
      layer:+document.getElementById('ilayer').value,
      position:+document.getElementById('ipos').value,
      mode:document.getElementById('mode').value,
      token:document.getElementById('itoken').value,
      token2:document.getElementById('itoken2').value,
      alpha:+document.getElementById('ialpha').value,
      k:+document.getElementById('ik').value,
      max_tokens:+document.getElementById('gentok').value,
    });
    document.getElementById('ibase').textContent = data.baseline || '(empty)';
    document.getElementById('iint').textContent = data.intervened || '(empty)';
    s.textContent='';
  } catch(e){ s.textContent='error: '+e.message; }
}

function esc(s){ return (s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function clip(s){ s=(s??'').replace(/\n/g,'⏎'); return s.length>10?s.slice(0,10)+'…':s || '␣'; }
loadMeta();
</script>
</body>
</html>
